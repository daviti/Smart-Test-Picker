name: Nightly Regression

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every night
  workflow_dispatch:
    inputs:
      notify_slack:
        description: 'Notify Slack on completion?'
        type: boolean
        default: true

jobs:
  full-suite:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --with-deps

      # Smart picker is BYPASSED here — full suite always
      - name: Run full suite (shard ${{ matrix.shard }}/4)
        run: |
          npx playwright test \
            --shard=${{ matrix.shard }}/4 \
            --reporter=html,list
        env:
          BASE_URL: ${{ vars.STAGING_URL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

  summarize:
    name: Nightly Summary
    needs: full-suite
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Report nightly status
        run: |
          STATUS="${{ needs.full-suite.result }}"
          echo "### Nightly Regression — $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status: **$STATUS**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full suite ran (picker bypassed). Artifacts retained for 30 days." >> $GITHUB_STEP_SUMMARY
